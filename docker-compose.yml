services:
  # SERVIDOR DE APLICACIÓN (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: padel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - padel-network

  # SERVIDOR WEB (Nginx)
  web:
    image: nginx:alpine
    container_name: padel-web
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - padel-network

  # BBDD (MySQL)
  db:
    image: mysql:8.0
    container_name: padel-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: padel_club
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: user_pass
      MYSQL_USER: user_padel
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    networks:
      - padel-network
      
  # NODE 
  node:
    image: node:20-alpine
    container_name: padel-node
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    ports:
      - "5173:5173" 
    tty: true
    networks:
      - padel-network

networks:
  padel-network:
    driver: bridge